<!-- Menú de Vistas (Compacto, minimalista y adaptativo) -->
<div class="flex bg-slate-950 border border-slate-800 p-0.5 rounded-lg w-full lg:w-auto justify-center">


    <button ng-click="setTab('hosts')"
        class="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-[11px] font-semibold transition-all"
        ng-class="currentTab === 'hosts' ? 'bg-cyan-500 text-slate-950 shadow-[0_0_10px_rgba(6,182,212,0.2)]' : 'text-slate-400 hover:text-slate-200'">
        
        <svg xmlns="http://www.w3.org/2000/svg" strokeWidth={1.5} class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" d="M9 17.25v1.007a3 3 0 0 1-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0 1 15 18.257V17.25m6-12V15a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 15V5.25m18 0A2.25 2.25 0 0 0 18.75 3H5.25A2.25 2.25 0 0 0 3 5.25m18 0V12a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 12V5.25" />
        </svg>

        Hosts
    </button>

    <button ng-click="setTab('inventory')"
        class="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-[11px] font-semibold transition-all"
        ng-class="currentTab === 'inventory' ? 'bg-cyan-500 text-slate-950 shadow-[0_0_10px_rgba(6,182,212,0.2)]' : 'text-slate-400 hover:text-slate-200'">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" />
        </svg>
        Tabla de Inventario
    </button>
    

    <button ng-click="setTab('services-discovered')"
        class="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-[11px] font-semibold transition-all"
        ng-class="currentTab === 'services-discovered' ? 'bg-cyan-500 text-slate-950 shadow-[0_0_10px_rgba(6,182,212,0.2)]' : 'text-slate-400 hover:text-slate-200'"
        title="Servicios Descubiertos">
        <svg xmlns="http://www.w3.org/2000/svg"  stroke-width="1.5" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v11.25A2.25 2.25 0 0 0 6 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0 1 18 16.5h-2.25m-7.5 0h7.5m-7.5 0-1 3m8.5-3 1 3m0 0 .5 1.5m-.5-1.5h-9.5m0 0-.5 1.5m.75-9 3-3 2.148 2.148A12.061 12.061 0 0 1 16.5 7.605" />
        </svg>

        Servicios Descubiertos
    </button>
<button ng-click="setTab('services-download')"
        class="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-[11px] font-semibold transition-all"
        ng-class="currentTab === 'services-download' ? 'bg-cyan-500 text-slate-950 shadow-[0_0_10px_rgba(6,182,212,0.2)]' : 'text-slate-400 hover:text-slate-200'"
        title="Exportar listado de hosts segmentados por servicios">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
        </svg>
        Descargas
    </button>
<!--Credenciales-->
    <button ng-click="setTab('credentials')"
        class="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-[11px] font-semibold transition-all"
        ng-class="currentTab === 'credentials' ? 'bg-cyan-500 text-slate-950 shadow-[0_0_10px_rgba(6,182,212,0.2)]' : 'text-slate-400 hover:text-slate-200'">
        
        <svg xmlns="http://www.w3.org/2000/svg" strokeWidth={1.5} class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" d="M9 17.25v1.007a3 3 0 0 1-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0 1 15 18.257V17.25m6-12V15a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 15V5.25m18 0A2.25 2.25 0 0 0 18.75 3H5.25A2.25 2.25 0 0 0 3 5.25m18 0V12a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 12V5.25" />
        </svg>

        Credenciales
    </button>
        <!-- Importar Archvo-->
    <button
        
        class="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-[11px] font-semibold transition-all"
        ng-class="currentTab === 'services-import' ? 'bg-cyan-500 text-slate-950 shadow-[0_0_10px_rgba(6,182,212,0.2)]' : 'text-slate-400 hover:text-slate-200'"
        title="Importar XML Nmap">
        <label
            class="px-3 py-1.5 text-[11px] font-semibold rounded-lg bg-slate-800 hover:bg-slate-700 text-cyan-400 border border-slate-700/80 cursor-pointer transition-all flex items-center gap-1.5 shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
            </svg>
            Importar XML Nmap
            <input type="file" 
            onchange="angular.element(this).scope().uploadFile(this.files[0])"
            id="fileInput" accept=".xml" class="hidden" />
        </label>
    </button>

    <div class="flex gap-2 w-full sm:w-auto">
        <input type="text" ng-model="searchText" placeholder="Buscar IP, servicio, puerto, OS..."
            class="bg-slate-950 border border-slate-800 rounded-lg px-3 py-1.5 text-xs text-slate-300 focus:outline-none focus:border-cyan-500 w-full sm:w-72 placeholder-slate-600 transition-all"
            ng-disabled="hosts.length === 0" />
    </div>
</div>

<!-- PANTALLA 0: HOsts -->
<div ng-include="'/views/hosts.html'" ng-if="currentTab === 'hosts'"
class="bg-slate-900 border border-slate-800/80 rounded-2xl overflow-hidden shadow-2xl flex flex-col" ></div>

<div ng-include="'/views/general.html'" ng-if="currentTab === 'inventory'"
class="bg-slate-900 border border-slate-800/80 rounded-2xl overflow-hidden shadow-2xl flex flex-col" ></div>

<div ng-include="'/views/discovered.html'" ng-if="currentTab === 'services-discovered'"
class="bg-slate-900 border border-slate-800/80 rounded-2xl overflow-hidden shadow-2xl flex flex-col" ></div>


<div ng-include="'/views/downloads.html'" ng-if="currentTab === 'services-download'"
class="bg-slate-900 border border-slate-800/80 rounded-2xl overflow-hidden shadow-2xl flex flex-col" ></div>

<div ng-include="'/views/credentials.html'" ng-if="currentTab === 'credentials'"
class="p-6 bg-slate-900 border border-slate-800 rounded-2xl shadow-xl" ></div>

<!-- Sistema de Notificaciones Toast Personalizado -->
<div class="fixed top-4 right-4 z-50 flex flex-col gap-2 max-w-sm w-full">
    <div ng-repeat="toast in toasts"
        class="p-4 rounded-xl border shadow-2xl backdrop-blur-md flex items-start gap-3 transition-all duration-300 transform translate-x-0"
        ng-class="{'bg-emerald-950/90 border-emerald-500/40 text-emerald-300': toast.type === 'success', 'bg-red-950/90 border-red-500/40 text-red-300': toast.type === 'error', 'bg-indigo-950/90 border-indigo-500/40 text-indigo-300': toast.type === 'info', 'bg-amber-950/90 border-amber-500/40 text-amber-300': toast.type === 'warning'}">
        <div class="flex-1 text-xs">
            <strong class="font-bold uppercase block mb-1">{{toast.title}}</strong>
            <p>{{toast.message}}</p>
        </div>
        <button class="text-slate-400 hover:text-slate-200 text-sm font-bold"
            ng-click="removeToast($index)">&times;</button>
    </div>
</div>
