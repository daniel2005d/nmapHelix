# nginx.conf
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    log_format verbose_proxy '$remote_addr - $remote_user [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         '"$http_referer" "$http_user_agent" '
                         '"$host" -> "$upstream_addr" ($upstream_status)';

access_log /var/log/nginx/access.log verbose_proxy;
    server {
        listen 80;
        server_name localhost;
                                 root /usr/share/nginx/html;
                          index index.html;
        location /api/ {
                proxy_pass http://helix-api:9090;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Debug-Proxy "$scheme://$host$request_uri";
        }
                    location / {
                        try_files $uri $uri/ =404;
                    }
    }

}
