{{showCommandModal}}
<!-- Tabla de datos (Se expande automáticamente) -->
<div class="flex-grow min-h-0 overflow-hidden">

    <!-- Botón para alternar el panel -->
    <button ng-click="isPanelOpen = !isPanelOpen"
        class="mb-4 text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1 rounded border border-slate-700">
        {{ isPanelOpen ? '▲ Ocultar Panel' : '▼ Mostrar Panel' }}
    </button>

    <!-- Panel Lateral Colapsable ahora en posición superior -->
    <div ng-show="isPanelOpen" class="w-full bg-slate-950 border-b border-slate-800 p-4 transition-all duration-300">
        <ul>
            <li ng-repeat="item in filteredTableRows| filter:searchText">
                {{item.ip}}:{{item.port}}
            </li>
        </ul>


    </div>


    <div class="overflow-x-auto max-h-[600px] border border-slate-800 rounded-lg">
        <table class="w-full text-left text-xs text-slate-300">
            <thead
                class="bg-slate-950 text-[10px] text-slate-400 uppercase tracking-wider sticky top-0 border-b border-slate-800">
                <tr>
                    <th class="py-3 px-5">Estado</th>
                    <th class="py-3 px-5">Host IP</th>
                    <th class="py-3 px-5 ">Puerto</th>
                    <th class="py-3 px-5">Servicio</th>
                    <th class="py-3 px-5">Versión y Producto</th>
                    <th class="py-3 px-5"></th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-700/60">
                <tr ng-repeat="row in filteredTableRows | filter:searchText"
                    class="hover:bg-slate-800/40 transition-colors">
                    <td class="py-3.5 px-5">
                        
                        <button ng-click="updateprop($event,'discovered',row)"
                            class="w-12 h-6 rounded-full p-1 transition-all flex items-center border border-slate-900/50">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                ng-class="{'discovered-color':row.discovered,'cyan-color':!row.discovered}"
                                style="width: 20px;">
                                <path fill-rule="evenodd"
                                    d="M6.32 2.577a49.255 49.255 0 0 1 11.36 0c1.497.174 2.57 1.46 2.57 2.93V21a.75.75 0 0 1-1.085.67L12 18.089l-7.165 3.583A.75.75 0 0 1 3.75 21V5.507c0-1.47 1.073-2.756 2.57-2.93Z"
                                    clip-rule="evenodd" />
                            </svg>
                        </button>
                    </td>
                    <td class="py-3.5 px-5 font-mono">
                        {{ row.ip }}</td>
                    
                    <td class="py-3.5 px-5 text-center">
                         <span ng-class="getPortCss(row);">
                                      
                        {{ row.port }}
                        </span>
                   
            </span>    
                   
                    </td>
                    <td class="py-3.5 px-3">
                        <input type="text" ng-model="row.service_name"
                           ng-focus="cacheOriginal('service_name',row)"
                            ng-keypress="updateprop($event,'service_name', row);"
                            ng-blur="updateprop($event,'service_name', row);"
                            class="bg-slate-950 border border-slate-800 rounded px-2 py-1 w-full" />
                    </td>
                    <td class="py-3.5 px-3">
                        <input type="text" ng-model="row.product_version"
                         ng-focus="cacheOriginal('product_version',row)"
                            ng-keypress="updateprop($event,'product_version', row);"
                            ng-blur="updateprop($event,'product_version', row);"
                            class="bg-slate-950 border border-slate-800 rounded px-2 py-1 w-full" />
                    </td>
                    <td class="py-3.5 px-3 cursor-pointer" ng-click="openCommandModal(row)">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="size-6">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="m6.75 7.5 3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0 0 21 18V6a2.25 2.25 0 0 0-2.25-2.25H5.25A2.25 2.25 0 0 0 3 6v12a2.25 2.25 0 0 0 2.25 2.25Z" />
                        </svg>

                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    
</div>


<!-- Modal para ingresar comando -->
<div ng-show="showCommandModal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    
    <div class="bg-slate-900 border border-slate-700 p-6 rounded-lg w-full max-w-2xl shadow-2xl">
        <h2 class="text-white text-lg font-bold mb-4">Enviar Comando a {{selectedRow.ip}}</h2>
        <textarea ng-model="commandInput" class="w-full h-32 bg-slate-950 border border-slate-800 rounded p-2 text-slate-300 mb-4" placeholder="Ingrese el comando..."></textarea>
        <div class="flex justify-end gap-2">
            <button ng-click="closeCommandModal()" class="px-4 py-2 bg-slate-800 rounded text-slate-400">Cancelar</button>
            <button ng-click="sendCommand(selectedRow, commandInput)" class="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 rounded text-white font-bold">Enviar</button>
        </div>
    </div>
</div>
