   <header class="mb-6 flex justify-between items-center">
        <div>
            <h2 class="text-lg font-bold text-cyan-400">Gestor de Credenciales</h2>
            
        </div>
        <button ng-click="openModal()" class="flex items-center gap-2 px-4 py-2 bg-cyan-600 hover:bg-cyan-500 text-slate-900 font-bold rounded-lg transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-3">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>

        </button>
    </header>

    <!-- Tabla Principal: Resumen agrupado -->
    <div class="bg-slate-950 rounded-lg border border-slate-800 overflow-hidden">
        <table class="w-full text-left text-sm text-slate-400">
            <thead class="bg-slate-900 text-slate-200 uppercase text-[10px]">
                <tr>
                    <th class="p-3">Host</th>
                    <th class="p-3">Usuario</th>
                    <th class="p-3">Contraseña</th>
                    <th class="p-3">Puerto</th>
                    
                    <th class="p-3">Rol</th>
                </tr>
            </thead>
            <tbody>
                <tr ng-repeat="credential in credentials" class="border-b border-slate-800 hover:bg-slate-900/50">
                    <td class="p-3 font-mono text-cyan-300">{{credential.ip_address}}</td>
                    <td class="p-3 font-mono text-cyan-300">{{credential.username}}</td>
                    <td class="p-3 font-mono text-cyan-300">{{credential.password}}</td>
                    <td class="p-3 font-mono text-cyan-300">{{credential.port_number}}</td>
                    <td class="p-3 font-mono text-cyan-300">{{credential.role}}</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Modal de Gestión -->
    <div ng-if="showModal" class="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 border border-slate-700 p-6 rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="text-lg font-bold text-slate-100 mb-4">Gestionar Credencial</h3>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <input type="text" ng-model="modalCred.username" placeholder="Usuario" class="bg-slate-950 p-2 border border-slate-700 rounded text-sm text-slate-200">
                <input type="text" ng-model="modalCred.password" placeholder="Contraseña" class="bg-slate-950 p-2 border border-slate-700 rounded text-sm text-slate-200">
                <input type="text" ng-model="modalCred.hash" placeholder="Hash" class="bg-slate-950 p-2 border border-slate-700 rounded text-sm text-slate-200">
                <select ng-model="modalCred.role" class="bg-slate-950 p-2 border border-slate-700 rounded text-sm text-slate-200">
                    <option value="administrador">Administrador</option>
                    <option value="usuario">Usuario</option>
                </select>
                <select ng-model="modalCred.type" class="bg-slate-950 p-2 border border-slate-700 rounded text-sm text-slate-200">
                    <option value="clear-text">Clear-text</option>
                    <option value="hash">Hash</option>
                    <option value="token">Token</option>
                </select>
            </div>

            <div class="mb-4">
                <h4 class="text-xs font-semibold text-slate-400 mb-2">Vincular Servicios</h4>
                <input type="text" ng-model="filterSearchCredential" class="bg-slate-950 border border-slate-700 rounded text-sm text-slate-200" /> 

                <div class="h-40 overflow-y-auto border border-slate-800 bg-slate-950 p-2 mt-1 rounded">
                    <label ng-repeat="service in credentialsServices |filter:filterSearchCredential" class="flex items-center gap-2 p-1 text-xs text-slate-300 hover:bg-slate-800 rounded">
                        <input type="checkbox" ng-model="service.selected"> {{service.ip}}:{{service.port}}
                    </label>
                </div>
            </div>

            <div class="flex justify-end gap-2">
                <button ng-click="closeModal()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded">Cancelar</button>
                <button ng-click="saveCredential()" class="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 text-slate-900 font-bold rounded">Guardar y Cerrar</button>
            </div>
        </div>
    </div>
